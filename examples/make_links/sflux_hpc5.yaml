env:
    synthetic_start_date: 2026-10-18
    sflux_root: /scratch/nasbdo/modeling_data/atmospheric
sflux_specification:   
   air:
       - label: DWR
         directory: "${sflux_root}/atmospheric_dwr/baydelta_sflux_v20220916"            
         rel_path: "baydelta_schism_air_{year:4d}{month:02d}{day:02d}.nc"
         use_after: 2004-01-01                                            # If early spec is out of time window of run it will be skipped
       - label: HRRR
         directory: "${sflux_root}/atmospheric_hrrr"
         rel_path: "{year:4d}/hrrr_{year:4d}{month:02d}{day:02d}00.nc"          
         use_after: 2020-01-01
       - label: HRRR copied                                                    
         directory: "/synthetic_hrrr"            
         rel_path: "{year:4d}/hrrr_{year:4d}{month:02d}{day:02d}00.nc"    
         use_after: $synthetic_start_date
   rad:
       - label: NARR
         directory: "${sflux_root}/NARR_cropped"            
         rel_path: "{year:4d}_{month:02d}/narr_rad.{year:4d}_{month:02d}_{day:02d}.nc"
         use_after: 2009-01-01   
       - label: HRRR
         directory: "${sflux_root}/atmospheric_hrrr"
         rel_path: "{year:4d}/hrrr_{year:4d}{month:02d}{day:02d}00.nc"         #
         use_after: 2020-01-01   
       - label: HRRR copied
         directory: "/synthetic_hrrr"            
         rel_path: "{year:4d}/hrrr_{year:4d}{month:02d}{day:02d}00.nc"   
         use_after: $synthetic_start_date 
   prc:
       - label: NARR
         directory: "${sflux_root}/NARR_cropped"            
         rel_path: "{year:4d}_{month:02d}/narr_prc.{year:4d}_{month:02d}_{day:02d}.nc"
         use_after: 2009-01-01     
       - label: HRRR
         directory: "${sflux_root}/atmospheric_hrrr"
         rel_path: "{year:4d}/hrrr_{year:4d}{month:02d}{day:02d}00.nc"       
         use_after: 2020-01-01         
       - label: HRRR copied
         directory: "/synthetic_hrrr"            
         rel_path: "{year:4d}/hrrr_{year:4d}{month:02d}{day:02d}00.nc"    
         use_after: $synthetic_start_date
